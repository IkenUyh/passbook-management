name: Deploy Passbook Backend

on:
  push:
    branches: [ "develop", "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dang nhap Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build va push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./passbook-management-api
          file: ./passbook-management-api/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/passbook-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH vao VPS va Deploy Passbook
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script: |
            cd /root/passbook-management/passbook-management-api
            git checkout develop
            git pull origin develop
            
            # Keo image moi tu Docker Hub ve
            sudo docker compose -p passbook-api pull
            
            # Run container moi len thay the con cu
            sudo docker compose -p passbook-api up -d