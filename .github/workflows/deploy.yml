name: Deploy Passbook Backend

on:
  push:
    branches: [ "develop", "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH vao VPS va Deploy Passbook
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script: |
            cd /root/passbook-management/passbook-management-api
            git checkout develop
            git pull origin develop
            sudo docker compose -p passbook-api up -d --build